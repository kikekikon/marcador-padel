<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padel Scoreboard Pro - Búfalo Club</title>
    <style>
        :root {
            --bg-blue: #1a56db;
            --line-color: rgba(255, 255, 255, 0.2);
            --ball-yellow: #dfff00;
            --logo-green: #0c9c61;
            --set-yellow: #f1c40f;
            --gold: #ffd700;
        }

        body {
            background-color: #000;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100vw;
            font-family: 'Arial Black', sans-serif;
            color: white;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .scoreboard {
            background-color: var(--bg-blue);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 2vh 5vw;
            border: 10px solid #333;
            box-sizing: border-box;
            min-height: 85vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: clamp(1rem, 1.8vw, 2.5rem);
            font-family: monospace;
            opacity: 0.9;
            flex-wrap: wrap;
            gap: 10px;
        }

        .cancha-label {
            background: #ffcc00;
            color: black;
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: 900;
            font-size: clamp(0.8rem, 1.5vw, 1.5rem);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 4px solid white;
            padding-bottom: 5px;
        }

        .club-logo {
            width: clamp(40px, 4.5vw, 80px); 
            height: clamp(40px, 4.5vw, 80px);
            background-color: var(--logo-green);
            border-radius: 50%;
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            font-size: clamp(8px, 0.7vw, 12px);
            text-align: center;
            color: black;
        }

        .team-row {
            display: grid;
            grid-template-columns: 0.4fr 2.5fr 1.2fr 0.8fr 1.2fr 0.4fr;
            align-items: center;
            min-height: 25vh;
            gap: 10px;
            transition: all 0.3s ease;
            border-radius: 20px;
            padding: 10px;
        }

        .ball-slot { display: flex; justify-content: center; }
        .ball {
            width: clamp(20px, 3vw, 40px); 
            height: clamp(20px, 3vw, 40px);
            background-color: var(--ball-yellow);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--ball-yellow);
            cursor: pointer;
            visibility: hidden;
        }
        .ball.active { visibility: visible; }

        .player-names { 
            font-size: clamp(1.2rem, 4vw, 4.5rem); 
            text-transform: uppercase; 
            outline: none; 
            display: flex; 
            align-items: center;
            overflow: hidden;
        }
        
        .winner-crown {
            display: none;
            font-size: clamp(1.5rem, 4vw, 4.5rem);
            margin-left: 10px;
            filter: drop-shadow(0 0 10px gold);
        }

        .history-sets {
            display: flex;
            gap: 10px;
            font-size: clamp(1.5rem, 4vw, 4rem);
            color: rgba(255, 255, 255, 0.6);
            justify-content: flex-end;
            min-width: 100px;
        }

        .sets-count { 
            font-size: clamp(2.5rem, 8vw, 9rem); 
            text-align: center; 
            color: var(--set-yellow); 
            border-right: 2px solid var(--line-color); 
        }
        .games-count { 
            font-size: clamp(3.5rem, 12vw, 13rem); 
            text-align: center; 
        }
        
        .point-container {
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 5px;
        }

        .current-point {
            font-size: clamp(2.5rem, 8vw, 9rem);
            background: rgba(0, 0, 0, 0.4);
            text-align: center;
            border-radius: 15px;
            cursor: pointer;
            min-width: 12vw;
            padding: 5px;
            transition: all 0.3s;
        }

        @keyframes teamFlash {
            0% { background-color: transparent; }
            50% { background-color: rgba(223, 255, 0, 0.2); box-shadow: inset 0 0 50px rgba(223, 255, 0, 0.3); }
            100% { background-color: transparent; }
        }
        .row-animation { animation: teamFlash 0.6s ease; }

        .gold-point {
            color: var(--gold) !important;
            box-shadow: 0 0 20px var(--gold);
            border: 2px solid var(--gold);
        }

        hr { border: 0; border-top: 4px solid var(--line-color); width: 100%; }

        .controls { 
            background: #111; padding: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
        }
        
        button, select {
            padding: 10px 15px; font-size: clamp(0.7rem, 0.9rem, 1.2rem); cursor: pointer; border-radius: 5px; border: none;
            background: #444; color: white; font-weight: bold; text-transform: uppercase;
        }
        button:disabled, select:disabled { opacity: 0.2; cursor: not-allowed; }
        .btn-coin { background: #f39c12; }
        .btn-reset { background: #c0392b; }

        #overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); padding: 30px; border-radius: 20px;
            display: none; text-align: center; z-index: 100; border: 5px solid gold; width: 80vw; max-width: 500px;
        }
        .btn-overlay-start {
            margin-top: 20px; background: #27ae60; padding: 15px 30px; font-size: clamp(1.2rem, 2rem, 2.5rem);
            color: white; border: none; border-radius: 10px; cursor: pointer; display: none;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h2 id="overlay-text" style="font-size: clamp(1.5rem, 2.5rem, 3.5rem); color: gold; margin-bottom: 10px; white-space: pre-line;"></h2>
        <button id="btn-overlay-start" class="btn-overlay-start" onclick="closeOverlayAndStart()">INICIAR PARTIDO</button>
    </div>

    <div class="scoreboard">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="cancha-label" contenteditable="true">CANCHA 3</div>
                <span id="match-time">00:00:00</span>
            </div>
            <div class="logo-container">
                <span>PADEL SCORE</span>
                <div class="club-logo">BÚFALO<br>CLUB</div>
            </div>
            <span id="current-clock">--:--</span>
        </div>

        <div class="team-row" id="row-t1">
            <div class="ball-slot"><div class="ball" id="ball-t1" onclick="setServer('t1')"></div></div>
            <div class="player-names" contenteditable="true">
                <span id="name-t1">EQUIPO 1</span>
                <span class="winner-crown" id="crown-t1">👑</span>
            </div>
            <div class="history-sets" id="history-t1"></div>
            <div class="sets-count" id="sets-t1">0</div>
            <div class="games-count" id="games-t1">0</div>
            <div class="point-container">
                <div class="current-point" id="pt-t1" onclick="addPoint('t1')">00</div>
                <div class="stepper-btns">
                    <button style="display:block; margin-bottom:5px;" onclick="addPoint('t1')">▲</button>
                    <button style="display:block;" onclick="removePoint('t1')">▼</button>
                </div>
            </div>
        </div>

        <hr>

        <div class="team-row" id="row-t2">
            <div class="ball-slot"><div class="ball" id="ball-t2" onclick="setServer('t2')"></div></div>
            <div class="player-names" contenteditable="true">
                <span id="name-t2">EQUIPO 2</span>
                <span class="winner-crown" id="crown-t2">👑</span>
            </div>
            <div class="history-sets" id="history-t2"></div>
            <div class="sets-count" id="sets-t2">0</div>
            <div class="games-count" id="games-t2">0</div>
            <div class="point-container">
                <div class="current-point" id="pt-t2" onclick="addPoint('t2')">00</div>
                <div class="stepper-btns">
                    <button style="display:block; margin-bottom:5px;" onclick="addPoint('t2')">▲</button>
                    <button style="display:block;" onclick="removePoint('t2')">▼</button>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <select id="set-mode" onchange="checkValidation()">
            <option value="" disabled selected>ELEGIR SETS</option>
            <option value="2">Gana 2 Sets</option>
            <option value="3">Gana 3 Sets</option>
        </select>
        <select id="point-mode" onchange="checkValidation()">
            <option value="" disabled selected>ELEGIR PUNTO</option>
            <option value="oro">PUNTO DE ORO</option>
            <option value="ventaja">MODO VENTAJA</option>
        </select>
        <button id="btn-coin" class="btn-coin" onclick="tossCoin()" disabled>Sorteo Saque</button>
        <button id="btn-start" onclick="startTimer()" style="background: #27ae60;" disabled>Iniciar</button>
        <button onclick="pauseTimer()">Pausar</button>
        <button class="btn-reset" onclick="resetAll()">Reset</button>
    </div>

    <script>
        let seconds = 0;
        let timerInterval = null;
        let gameFinished = false;
        let isTieBreak = false;
        let points = { t1: 0, t2: 0 }; 
        let games = { t1: 0, t2: 0 };
        let sets = { t1: 0, t2: 0 };
        let setHistory = { t1: [], t2: [] };
        let undoStack = []; 

        const ptsMap = ["00", "15", "30", "40", "AV"];
        let lastActionTime = 0;
        const DEBOUNCE_DELAY = 1200; 

        function pushToUndoStack() {
            const state = {
                points: { ...points },
                games: { ...games },
                sets: { ...sets },
                setHistory: { t1: [...setHistory.t1], t2: [...setHistory.t2] },
                isTieBreak,
                gameFinished,
                server: document.getElementById('ball-t1').classList.contains('active') ? 't1' : 't2'
            };
            undoStack.push(JSON.stringify(state));
            if (undoStack.length > 20) undoStack.shift(); 
        }

        function triggerFlash(team) {
            const row = document.getElementById('row-' + team);
            row.classList.remove('row-animation');
            void row.offsetWidth;
            row.classList.add('row-animation');
        }

        function addPoint(team) {
            if (gameFinished) return;
            if (!timerInterval) { alert("Inicie el partido primero"); return; }
            const now = Date.now();
            if (now - lastActionTime < DEBOUNCE_DELAY) return;
            lastActionTime = now;

            pushToUndoStack(); 
            triggerFlash(team);

            if (isTieBreak) {
                points[team]++;
                const opponent = team === 't1' ? 't2' : 't1';
                if (points[team] >= 7 && (points[team] - points[opponent] >= 2)) updateSets(team);
            } else {
                const opponent = team === 't1' ? 't2' : 't1';
                const isPuntoOro = document.getElementById('point-mode').value === 'oro';
                if (points[team] < 3) points[team]++;
                else if (points[team] === 3) {
                    if (points[opponent] < 3 || isPuntoOro) updateGames(team);
                    else if (points[opponent] === 3) points[team] = 4;
                    else if (points[opponent] === 4) points[opponent] = 3;
                } else if (points[team] === 4) updateGames(team);
            }
            renderAll();
            saveState();
        }

        function removePoint(team) {
            if (gameFinished) gameFinished = false; 
            const now = Date.now();
            if (now - lastActionTime < DEBOUNCE_DELAY) return;
            lastActionTime = now;

            if (undoStack.length > 0) {
                const lastState = JSON.parse(undoStack.pop());
                points = lastState.points;
                games = lastState.games;
                sets = lastState.sets;
                setHistory = lastState.setHistory;
                isTieBreak = lastState.isTieBreak;
                gameFinished = lastState.gameFinished;
                setServer(lastState.server);
                
                document.getElementById('crown-t1').style.display = 'none';
                document.getElementById('crown-t2').style.display = 'none';
                document.getElementById('overlay').style.display = 'none';
                
                renderAll();
                saveState();
            }
        }

        function updateGames(team) {
            games[team]++;
            points.t1 = 0; points.t2 = 0;
            if (games.t1 === 6 && games.t2 === 6) {
                isTieBreak = true;
                showOverlay("¡TIE-BREAK!", true);
            } else if ((games[team] >= 6 && Math.abs(games.t1 - games.t2) >= 2) || games[team] === 7) {
                updateSets(team);
            } else {
                toggleServer();
            }
        }

        function updateSets(team) {
            setHistory.t1.push(games.t1);
            setHistory.t2.push(games.t2);
            sets[team]++;
            games.t1 = 0; games.t2 = 0;
            points.t1 = 0; points.t2 = 0;
            isTieBreak = false;
            const target = parseInt(document.getElementById('set-mode').value);
            if (sets[team] >= target) {
                gameFinished = true;
                pauseTimer();
                document.getElementById('crown-' + team).style.display = 'inline-block';
                showOverlay("FIN DEL JUEGO\nGANADOR: " + document.getElementById('name-' + team).innerText, false);
            } else {
                showOverlay("SET PARA " + document.getElementById('name-' + team).innerText, true);
                toggleServer();
            }
        }

        function renderAll() {
            const pt1 = document.getElementById('pt-t1');
            const pt2 = document.getElementById('pt-t2');
            const isPuntoOro = document.getElementById('point-mode').value === 'oro';
            if (isTieBreak) {
                pt1.innerText = points.t1; pt2.innerText = points.t2;
                pt1.classList.remove('gold-point'); pt2.classList.remove('gold-point');
            } else {
                pt1.innerText = ptsMap[points.t1]; pt2.innerText = ptsMap[points.t2];
                if (isPuntoOro && points.t1 === 3 && points.t2 === 3) {
                    pt1.innerText = "ORO"; pt2.innerText = "ORO";
                    pt1.classList.add('gold-point'); pt2.classList.add('gold-point');
                } else {
                    pt1.classList.remove('gold-point'); pt2.classList.remove('gold-point');
                }
            }
            document.getElementById('games-t1').innerText = games.t1;
            document.getElementById('games-t2').innerText = games.t2;
            document.getElementById('sets-t1').innerText = sets.t1;
            document.getElementById('sets-t2').innerText = sets.t2;
            document.getElementById('history-t1').innerHTML = setHistory.t1.map(g => `<span>${g}</span>`).join('');
            document.getElementById('history-t2').innerHTML = setHistory.t2.map(g => `<span>${g}</span>`).join('');
            
            // Bloquear controles si el timer está activo
            toggleConfigInputs(!!timerInterval);
        }

        function toggleConfigInputs(isDisabled) {
            document.getElementById('set-mode').disabled = isDisabled;
            document.getElementById('point-mode').disabled = isDisabled;
            document.getElementById('btn-coin').disabled = isDisabled || !document.getElementById('set-mode').value || !document.getElementById('point-mode').value;
            document.getElementById('btn-start').disabled = isDisabled || !document.getElementById('set-mode').value || !document.getElementById('point-mode').value;
        }

        function toggleServer() {
            const b1 = document.getElementById('ball-t1');
            if(b1.classList.contains('active')) setServer('t2');
            else setServer('t1');
        }

        function setServer(team) {
            document.getElementById('ball-t1').classList.remove('active');
            document.getElementById('ball-t2').classList.remove('active');
            document.getElementById('ball-' + team).classList.add('active');
        }

        function tossCoin() {
            showOverlay("SORTEANDO...", false);
            setTimeout(() => {
                const win = Math.random() > 0.5 ? 't1' : 't2';
                showOverlay("SACA: " + document.getElementById('name-' + win).innerText, false, true);
                setServer(win);
            }, 1500);
        }

        function checkValidation() {
            const s = document.getElementById('set-mode').value;
            const p = document.getElementById('point-mode').value;
            // Solo habilitar si no ha empezado el partido
            if(!timerInterval) {
                document.getElementById('btn-coin').disabled = !(s && p);
                document.getElementById('btn-start').disabled = !(s && p);
            }
        }

        function showOverlay(t, auto, btn) {
            const o = document.getElementById('overlay');
            document.getElementById('overlay-text').innerText = t;
            o.style.display = 'block';
            document.getElementById('btn-overlay-start').style.display = btn ? 'inline-block' : 'none';
            if (auto) setTimeout(() => o.style.display = 'none', 2500);
        }

        function closeOverlayAndStart() {
            document.getElementById('overlay').style.display = 'none';
            startTimer();
        }

        function startTimer() {
            if (timerInterval) return;
            timerInterval = setInterval(() => {
                seconds++;
                let hrs = Math.floor(seconds / 3600).toString().padStart(2,'0');
                let mins = Math.floor((seconds % 3600) / 60).toString().padStart(2,'0');
                let secs = (seconds % 60).toString().padStart(2,'0');
                document.getElementById('match-time').innerText = `${hrs}:${mins}:${secs}`;
            }, 1000);
            renderAll(); // Forzar bloqueo de inputs
            saveState();
        }

        function pauseTimer() { 
            clearInterval(timerInterval); 
            timerInterval = null; 
            renderAll(); // Liberar inputs si se desea (aunque lo lógico es mantener bloqueo, aquí se liberan al pausar según renderAll)
        }

        function saveState() {
            localStorage.setItem('padelState', JSON.stringify({seconds, points, games, sets, setHistory, isTieBreak, gameFinished, undoStack}));
        }

        function resetAll() {
            if(!confirm("¿Resetear partido?")) return;
            localStorage.removeItem('padelState');
            location.reload();
        }

        async function escucharHA() {
            try {
                const res = await fetch(`${window.location.origin}/api/states/input_text.padel_comando`, {
                    headers: {"Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI0ODViZDlhNTc3MjI0ZWVkYTUxMDA4Njk5NGY1NTczZiIsImlhdCI6MTc3ODU5MzY2MiwiZXhwIjoyMDkzOTUzNjYyfQ.HyNRR8huVct9qXtnvml-E1fVICIKW3qqWXGJ4Yi6wTw"}
                });
                const data = await res.json();
                const cmd = data.state;
                if (cmd !== "IDLE" && cmd !== "unknown") {
                    if (!timerInterval && !gameFinished) {
                        if (cmd === "ADD_T1") {
                            const sel = document.getElementById('set-mode');
                            sel.selectedIndex = sel.selectedIndex >= 2 ? 1 : sel.selectedIndex + 1;
                            checkValidation();
                        }
                        if (cmd === "ADD_T2") {
                            const sel = document.getElementById('point-mode');
                            sel.selectedIndex = sel.selectedIndex >= 2 ? 1 : sel.selectedIndex + 1;
                            checkValidation();
                        }
                        if (cmd === "SUB_T1") tossCoin();
                        if (cmd === "SUB_T2") if(!document.getElementById('btn-start').disabled) closeOverlayAndStart();
                    } else {
                        if (cmd === "ADD_T1") addPoint('t1');
                        if (cmd === "ADD_T2") addPoint('t2');
                        if (cmd === "SUB_T1") removePoint('t1');
                        if (cmd === "SUB_T2") removePoint('t2');
                    }
                    fetch(`${window.location.origin}/api/services/input_text/set_value`, {
                        method: 'POST',
                        headers: {"Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI0ODViZDlhNTc3MjI0ZWVkYTUxMDA4Njk5NGY1NTczZiIsImlhdCI6MTc3ODU5MzY2MiwiZXhwIjoyMDkzOTUzNjYyfQ.HyNRR8huVct9qXtnvml-E1fVICIKW3qqWXGJ4Yi6wTw"},
                        body: JSON.stringify({entity_id: "input_text.padel_comando", value: "IDLE"})
                    });
                }
            } catch(e) {}
        }
        setInterval(escucharHA, 500);

        window.onload = () => {
            const s = localStorage.getItem('padelState');
            if(s) {
                const d = JSON.parse(s);
                Object.assign(window, d);
                if(d.undoStack) undoStack = d.undoStack;
                renderAll();
            }
        };
        setInterval(() => {
            const now = new Date();
            document.getElementById('current-clock').innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0') + " h";
        }, 1000);
    </script>
</body>
</html>
